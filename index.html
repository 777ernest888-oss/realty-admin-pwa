<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2AABEE">
    <title>Моя Недвижимость</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="header">
        <h1>🏢 Мои объекты</h1>
        <button onclick="openSettings()" class="settings-btn">⚙️</button>
    </div>

    <div id="settings-screen" class="screen" style="display:none;">
        <h2>Настройки</h2>
        <div class="form-group">
            <label>URL Google Apps Script</label>
            <input type="text" id="script-url" placeholder="https://script.google.com/...">
        </div>
        <div class="form-group">
            <label>Agent ID</label>
            <input type="text" id="agent-id" placeholder="001">
        </div>
        <button onclick="saveSettings()" class="btn btn-primary">Сохранить</button>
        <button onclick="closeSettings()" class="btn btn-secondary">Отмена</button>
    </div>

    <div id="main-screen" class="screen">
        <button onclick="openForm()" class="btn btn-primary add-btn">+ Добавить объект</button>
        <div id="objects-list" class="loading">Загрузка...</div>
    </div>

    <div id="form-screen" class="screen" style="display:none;">
        <h2 id="form-title">Новый объект</h2>
        <form id="property-form">
            <input type="hidden" id="prop-id">
            <div class="form-group">
                <label>ID объекта *</label>
                <input type="text" id="prop-id-input" required placeholder="spb-001">
            </div>
            <div class="form-group">
                <label>Название ЖК *</label>
                <input type="text" id="prop-name" required placeholder="ЖК Солнечный">
            </div>
            <div class="form-group">
                <label>Район</label>
                <input type="text" id="prop-district" placeholder="Приморский">            </div>
            <div class="form-group">
                <label>Метро</label>
                <input type="text" id="prop-metro" placeholder="Комендантский проспект">
            </div>
            <div class="form-group">
                <label>Цена от (млн руб)</label>
                <input type="number" step="0.1" id="prop-price-from" placeholder="5.2">
            </div>
            <div class="form-group">
                <label>Цена до (млн руб)</label>
                <input type="number" step="0.1" id="prop-price-to" placeholder="15.8">
            </div>
            <div class="form-group">
                <label>Комнаты</label>
                <input type="text" id="prop-rooms" placeholder="студия, 1, 2, 3">
            </div>
            <div class="form-group">
                <label>Площадь мин (м²)</label>
                <input type="number" step="0.1" id="prop-area-min" placeholder="23.1">
            </div>
            <div class="form-group">
                <label>Площадь макс (м²)</label>
                <input type="number" step="0.1" id="prop-area-max" placeholder="120.8">
            </div>
            <div class="form-group">
                <label>Срок сдачи</label>
                <input type="text" id="prop-completion" placeholder="II кв. 2027">
            </div>
            <div class="form-group">
                <label>Статус</label>
                <select id="prop-status">
                    <option value="Строится">Строится</option>
                    <option value="Сдан">Сдан</option>
                    <option value="Частично сдан">Частично сдан</option>
                </select>
            </div>
            <div class="form-group">
                <label>Класс</label>
                <select id="prop-class">
                    <option value="Комфорт">Комфорт</option>
                    <option value="Бизнес">Бизнес</option>
                    <option value="Премиум">Премиум</option>
                </select>
            </div>
            <div class="form-group">
                <label>Адрес</label>
                <input type="text" id="prop-address" placeholder="Санкт-Петербург, ул. Примерная, 1">
            </div>
            <div class="form-group">                <label>URL главного фото</label>
                <input type="url" id="prop-image" placeholder="https://github.com/.../photo.jpg">
            </div>
            <div class="form-group">
                <label>Активен</label>
                <select id="prop-active">
                    <option value="TRUE">Да</option>
                    <option value="FALSE">Нет</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <button type="button" onclick="closeForm()" class="btn btn-secondary">Отмена</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
