<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор ссылок для агентов</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 25px; font-size: 14px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        button:hover { opacity: 0.9; }        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 8px;
            display: none;
        }
        .result.show { display: block; }
        .result-label { color: #666; font-size: 12px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; }
        .result-url {
            background: white;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            color: #333;
            border: 1px solid #e0e0e0;
            margin-bottom: 12px;
            user-select: all;
        }
        .copy-btn { background: #10b981; margin-top: 0; }
        .copy-btn:hover { background: #059669; }
        .success-msg { color: #10b981; font-size: 14px; margin-top: 10px; display: none; }
        .success-msg.show { display: block; }
        .error { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }
        .error.show { display: block; }
        .hint {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Генератор ссылок</h1>
        <p class="subtitle">Для подключения агентов к приложению "Моя Недвижимость"</p>
       
        <div class="hint">
            💡 <strong>Как использовать:</strong> Вставьте URL скрипта агента (полученный из Apps Script) и нажмите кнопку. Готовую ссылку отправьте агенту.
        </div>

        <label for="scriptUrl">URL скрипта агента:</label>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/AKfycb.../exec" autocomplete="off">
        <p class="error" id="error"></p>
        <button onclick="generateLink()">Сгенерировать ссылку</button>

        <div class="result" id="result">
            <p class="result-label">Готовая ссылка для агента:</p>
            <div class="result-url" id="resultUrl"></div>
            <button class="copy-btn" onclick="copyLink()">📋 Скопировать ссылку</button>
            <p class="success-msg" id="successMsg">✅ Ссылка скопирована!</p>
        </div>
    </div>

    <script>
        function generateLink() {
            var scriptUrl = document.getElementById('scriptUrl').value.trim();
            var errorEl = document.getElementById('error');
            var resultEl = document.getElementById('result');
           
            if (!scriptUrl) {
                errorEl.textContent = '⚠️ Вставьте URL скрипта';
                errorEl.classList.add('show');
                resultEl.classList.remove('show');
                return;
            }
           
            if (scriptUrl.indexOf('https://script.google.com') !== 0) {
                errorEl.textContent = '⚠️ URL должен начинаться с https://script.google.com';
                errorEl.classList.add('show');
                resultEl.classList.remove('show');
                return;
            }
           
            if (scriptUrl.indexOf('/exec') === -1) {
                errorEl.textContent = '⚠️ URL должен заканчиваться на /exec';
                errorEl.classList.add('show');
                resultEl.classList.remove('show');
                return;
            }

            var encodedUrl = encodeURIComponent(scriptUrl);
            var finalLink = 'https://777ernest888-oss.github.io/realty-admin-pwa/?script=' + encodedUrl;
           
            document.getElementById('resultUrl').textContent = finalLink;
            errorEl.classList.remove('show');
            resultEl.classList.add('show');
        }

        function copyLink() {
            var url = document.getElementById('resultUrl').textContent;
            navigator.clipboard.writeText(url).then(function() {
                var msg = document.getElementById('successMsg');                msg.classList.add('show');
                setTimeout(function() { msg.classList.remove('show'); }, 2000);
            });
        }

        document.getElementById('scriptUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateLink();
            }
        });
    </script>
</body>
</html>
